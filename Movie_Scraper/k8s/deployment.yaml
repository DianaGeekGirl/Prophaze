apiVersion: apps/v1
kind: Deployment
metadata:
  name: webkyte-antipiracy
  namespace: default
  labels:
    app: webkyte-antipiracy
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webkyte-antipiracy
  template:
    metadata:
      labels:
        app: webkyte-antipiracy
        version: v1
    spec:
      containers:
      - name: webkyte-app
        image: moviechecker/webkyte-antipiracy:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: results
          mountPath: /app/results
        env:
        - name: FLASK_ENV
          value: "production"
      volumes:
      - name: results
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - webkyte-antipiracy
              topologyKey: kubernetes.io/hostname
